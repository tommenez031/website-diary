<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | My College Diary</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Times New Roman", Times, serif; }

        body {
            background-color: rgb(139, 64, 64); 
            color: white; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background-color: rgb(0, 0, 0); 
            padding: 20px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid white; 
        }

        header h1 { font-size: 32px; font-weight: bold; }

        header h1 a {
            text-decoration: none;
            color: white; 
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 25px;
            font-size: 20px;
            font-weight: bold;
            transition: 0.3s;
        }

        nav a:hover { color: #ffb6c1; text-decoration: underline; }

        section {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; 
            padding: 50px 20px;
        }

        
        .contact-card {
            background-color: rgb(98, 4, 4); 
            border: 4px solid white; 
            border-radius: 15px;
            padding: 40px;
            width: 100%;
            max-width: 600px;
            text-align: center;
            filter: drop-shadow(12px 12px 0px black); 
        }

        .contact-card h2 {
            font-size: 32px;
            margin-bottom: 20px;
            border-bottom: 4px solid white;
            display: inline-block;
            padding-bottom: 5px;
            color: white;
        }

        .contact-info {
            font-size: 20px;
            line-height: 2;
            color: white;
        }

        .contact-info strong {
            display: block;
            font-size: 22px;
            margin-top: 15px;
            color: white;
        }

        footer {
            text-align: center;
            padding: 20px;
            background-color: rgb(6, 98, 4);
            border-top: 4px solid white; 
            font-weight: bold;
            color: white;
        }
    </style>
</head>
<body>

<header>

        <a href="contact.html">Contact</a>
    </nav>

    </div>
</section>

</html>
